<!DOCTYPE html>
<head>
  <title>Goodreads Style</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: beige;
    }

    .main-layout{
      display:flex;
      min-height:100vh;
    }

    .left-side{
      width:50%;
      background-color:saddlebrown;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:60px;
      box-sizing:border-box;
    }

    .left-side h1{
      font-size:50px;
      margin-bottom:20px;
      font-family: Georgia, "Times New Roman", serif;
    }

    .left-side p{
      font-size:20px;
      line-height:1.6;
    }

    .right-side{
      width:50%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .header {
      text-align: center;
      font-size: 40px;
      font-weight: bold;
      color: black;
      margin-top: 40px;
      font-family: Georgia, "Times New Roman", serif;
    }

    .container {
      width: 350px;
      margin: 20px auto;
      background: white;
      padding: 25px;
      border: 1px solid dimgray;
      border-radius: 2px;
    }

    h2 {
      margin-bottom: 20px;
      color: black;
    }

    label {
      display: block;
      font-size: 13px;
      margin-top: 10px;
      color: dimgray;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid dimgray;
      border-radius: 20px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background-color: saddlebrown;
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background-color: beige;
    }

    .link {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: black;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 12px;
      color: dimgray;
    }

    .social-btn {
      background-color: whitesmoke;
      border: 1px solid dimgray;
      border-radius: 20px;
      color: black;
      margin-top: 10px;
    }

    .toggle {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
    }

    .toggle a {
      color: saddlebrown;
      text-decoration: none;
    }

    .toggle a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="main-layout">
    <div class="left-side">
      <h1>goodreads</h1>

      <p>
        Discover books, track your reading,
        and connect with readers around the world.
      </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">

      <div>
        <div class="header">goodreads</div>

        <div class="container" id="form-container">

          <div id="signin-form">
            <h2>Sign In</h2>

            <label>Email address</label>
            <input type="email" id="email" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">

            <button onclick="login()">Sign In</button>

            <script>
              function login() {
                var email = document.getElementById("email").value;
                var pass = document.getElementById("password").value;

                if (email === "ebciupan@antiquespride.edu.ph" && pass === "minggi2005") {
                    window.location.href = "about - emy.html";
                }
                if (email === "minoga@antiquespride.edu.ph" && pass === "andeng2005") {
                    window.location.href = "about - andrea.html";
                } 
                if (email === "bvnorella@antiquespride.edu.ph" && pass === "berna2006") {
                    window.location.href = "about - berna.html";
                }
              }
              
            </script>

            <a href="#" class="link">Forgot password?</a>

            <div class="divider">or</div>

            <button class="social-btn">Sign in with Google</button>
            <button class="social-btn">Sign in with Facebook</button>

            <div class="toggle">
              New here? <a href="goodreads sign-up.html">Create an account</a>
            </div>
          </div>

        </div>
      </div>

    </div>

  </div>

</body>
</html>
